# /etc/nginx/sites-available/pbev-instagram-bot
#
# Nginx config para:
# 1. Reverse proxy do FastAPI (webhook + API)
# 2. Hosting estático de imagens geradas
#
# Setup:
#   sudo ln -s /etc/nginx/sites-available/pbev-instagram-bot /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d seu-vps.com  (HTTPS obrigatório para webhooks Meta)
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name seu-vps.com;  # ← Substitua pelo seu domínio/IP

    # Redirect HTTP → HTTPS (Meta exige HTTPS para webhooks)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name seu-vps.com;  # ← Substitua pelo seu domínio/IP

    # Certbot vai preencher esses paths automaticamente
    # ssl_certificate /etc/letsencrypt/live/seu-vps.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/seu-vps.com/privkey.pem;

    # --- Security headers ---
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # --- Webhook + API (FastAPI reverse proxy) ---
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout para webhooks
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # --- Imagens geradas (hosting estático) ---
    # Meta Graph API precisa de URLs públicas para as imagens
    location /ig-images/ {
        alias /var/www/pbev-images/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";

        # Apenas imagens
        location ~* \.(jpg|jpeg|png|webp)$ {
            try_files $uri =404;
        }
    }

    # --- Rate limiting para webhook ---
    # Previne flood de requests falsos
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/m;

    location /webhook {
        limit_req zone=webhook burst=10 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Logs ---
    access_log /var/log/nginx/pbev-bot-access.log;
    error_log /var/log/nginx/pbev-bot-error.log;
}
