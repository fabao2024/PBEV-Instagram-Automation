# /etc/nginx/sites-available/pbev-instagram-bot
#
# Production vhost for the Instagram bot.
# TLS lines are intentionally left commented because Certbot manages them
# directly on the VPS after the certificate is installed.

server {
    listen 80;
    server_name bot.guiapbev.cloud;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bot.guiapbev.cloud;

    # Managed on the VPS by Certbot:
    # ssl_certificate /etc/letsencrypt/live/bot.guiapbev.cloud/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/bot.guiapbev.cloud/privkey.pem;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    location /webhook {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    location /ig-images/ {
        alias /var/www/pbev-images/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";

        location ~* \.(jpg|jpeg|png|webp)$ {
            try_files $uri =404;
        }
    }

    access_log /var/log/nginx/pbev-bot-access.log;
    error_log /var/log/nginx/pbev-bot-error.log;
}
